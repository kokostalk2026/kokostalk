<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koko's Talk - Log In</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" href="img/logo.png" type="image/png">
</head>

<body>

<a href="invitacion.html" class="return-btn">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="m15 18-6-6 6-6"/>
    </svg>
    <span>return</span>
</a>

<main class="main-container">
    <div class="content-wrapper">
 
        <!-- IZQUIERDA -->
        <div class="left-column">
            <div class="blue-arrow"></div>

            <div class="promo-card">
                <div class="promo-text-top">
                    <p>Are you ready to learn at <strong>Koko's Talk?</strong></p>
                </div>

                <div class="promo-image">
                    <img src="img/login2.png" alt="Descripción">
                </div>

                <div class="promo-text-bottom">
                    <span class="subtitulo">"Beyond the words"</span>
                </div>
            </div>
        </div>

        <!-- DERECHA -->
        <div class="right-column">
            <div class="login-card">

                <h1 class="login-title">Log In</h1>

                <p class="signup-text">
                    Don't have an account yet?
                    <a href="register.html" class="signup-link">sign up</a>
                </p>

                <!-- FORM (CORREGIDO) -->
                <form class="login-form" action="php/login.php" method="POST">

                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <div class="input-wrapper">
                            <input type="text" name="username" class="form-input" placeholder="Username" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <input type="password" name="password" class="form-input" placeholder="********" required>
                        </div>
                    </div>

                    <button type="submit" class="login-button">
                        log in now
                    </button>

                </form>

            </div>
        </div>

    </div>
</main>

<div class="decorative-lines">
    <div class="diagonal-line"></div>
    <div class="diagonal-line"></div>
    <div class="diagonal-line"></div>
    <div class="diagonal-line"></div>
    <div class="diagonal-line"></div>
</div>

</body>
</html>
